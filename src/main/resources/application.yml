logging:
  level:
    org:
      hibernate:
        SQL: debug
spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: @dataSource.url@
    username: @dataSource.user@
    password: @dataSource.password@
    max-active: 4
    max-idle: 2
    max-wait: 10000
    remove-abandoned: true
    remove-abandoned-timeout: 60
    log-abandoned: true
    validation-query: SELECT 1
  devtools:
    restart:
      trigger-file: reload
    livereload:
      enabled: false
  jackson:
    default-property-inclusion: NON_NULL
  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true
      format-sql: true
      use-sql-comments: true
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:@dataSource.createTablesScript@
      data-locations: classpath:@dataSource.createDataScript@
  web:
    locale: es_ES
    resources:
      static-locations: classpath:/public/
      add-mappings: true
server:
  servlet:
    context-path: @project.contextPath@
    encoding:
      enabled: true
      force: true
      force-request: true
      force-response: true
      charset: UTF-8
security:
  paths:
    public-login: /api/users/login
    public-signup: /api/users/signUp
    frontend-root: /
    frontend-index: /index.html
    frontend-static: /static/**
    frontend-assets: /assets/**
    frontend-images: /*.png
    frontend-icons: /*.ico
    frontend-manifest: /manifest.json
    frontend-service-worker: /service-worker.js
    swagger-ui: /swagger-ui/**
    swagger-docs: /v3/api-docs/**
project:
  jwt:
    signKey: WzROun12eUiDvko3UrJ74gNeJz2TWEWPMTh6DxyE8HWXIf4hETUrkM4IUGqqHq66PuVS
